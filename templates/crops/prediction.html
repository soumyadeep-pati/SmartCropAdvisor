{% extends 'base.html' %}

{% block content %}

<div class="card p-5">

    <h2>Recommended Crop</h2>

    <h1 class="text-success">
        🌾 {{ crop }}
    </h1>

    <hr>

    <p>
        Confidence:
        {{ confidence|floatformat:2 }}
    </p>

    <p>
        Location:
        {{ soil.location }}
    </p>

</div>

{% endblock %}
