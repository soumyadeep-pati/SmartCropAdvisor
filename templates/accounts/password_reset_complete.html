{% extends 'base.html' %}

{% block title %}Password Reset Complete - Smart Crop Advisor{% endblock %}

{% block extra_css %}
<style>
  .complete-page {
    min-height: calc(100vh - 76px - 80px);
    display: flex;
    align-items: center;
    padding: 2rem 0;
    position: relative;
    overflow: hidden;
  }

  .complete-page::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 400px 300px at 50% 50%, rgba(46, 204, 113, 0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .glass-card {
    position: relative;
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.35);
    border-radius: 24px;
    padding: 2.5rem 2rem;
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.12);
    animation: fadeSlideUp 0.7s ease-out both;
  }

  .glass-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 24px;
    background: linear-gradient(135deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 100%);
    pointer-events: none;
  }

  .glass-card > * { position: relative; z-index: 1; }

  .done-icon {
    font-size: 3.5rem;
    color: #2ecc71;
    margin-bottom: 1rem;
  }

  .glass-card h3 {
    font-weight: 700;
    color: #2c3e50;
    margin-bottom: 0.75rem;
  }

  .glass-card p {
    color: #6b7c8f;
    font-size: 0.95rem;
    line-height: 1.7;
  }

  .btn-login {
    padding: 0.8rem 2.5rem;
    font-weight: 700;
    font-size: 1rem;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    color: white;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    box-shadow: 0 6px 20px rgba(46, 204, 113, 0.3);
  }

  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(46, 204, 113, 0.4);
    color: white;
  }

  @keyframes fadeSlideUp {
    0% { opacity: 0; transform: translateY(30px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 575.98px) {
    .glass-card { padding: 1.5rem 1rem; border-radius: 18px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .glass-card { animation: none !important; }
  }
</style>
{% endblock %}

{% block content %}
<div class="complete-page">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7 col-sm-9">

        <div class="glass-card text-center">
          <div class="done-icon">
            <i class="fas fa-shield-halved"></i>
          </div>
          <h3>Password Reset Complete</h3>
          <p>
            Your password has been updated successfully.
            You can now log in with your new password.
          </p>

          <hr style="opacity: 0.15; margin: 1.5rem 0;">

          <a href="{% url 'login' %}" class="btn btn-login">
            <i class="fas fa-sign-in-alt"></i> Log In
          </a>
        </div>

      </div>
    </div>
  </div>
</div>
{% endblock %}
